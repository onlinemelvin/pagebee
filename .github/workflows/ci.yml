name: CI

# Runs on every check-in: pushes to the two long-lived branches and every PR
# that targets them. Keeps `development` and `main` green.
on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

# Cancel superseded runs on the same ref so a rapid push series doesn't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    env:
      # Prisma reads these from the schema datasource. `prisma generate` does not
      # connect to the DB, but the env() vars must resolve — dummy values are fine.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?pgbouncer=true
      DIRECT_URL: postgresql://user:pass@localhost:5432/db
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14
